services:
  navidrome-stat:
    build: .
    container_name: navidrome-stat
    ports:
      - "39421:39421"
    volumes:
      - ./navidrome_stats.db:/app/navidrome_stats.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:39421/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
